<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page center">

<div class="card">
<img src="images/gift.png" class="gift">

<h1>Happy Birthday Marchia 🎉</h1>

<button onclick="startPrank()">Klik di sini</button>
</div>

</div>


<!-- JUMPSCARE VIDEO -->
<div id="videoPage" class="page hidden">

<video id="scareVideo" preload="auto">
<source src="video/scare.mp4" type="video/mp4">
</video>

</div>


<!-- FINAL CHAOS PAGE -->
<div id="finalPage" class="page hidden chaos">

<audio id="bgMusic" preload="auto">
<source src="sound/telkomsel.mp3" type="audio/mpeg">
</audio>

<div id="emojiJump">🤙😎🤙</div>

<div class="content">
<img src="images/photo.jpg" class="photo">
<h1>🌈 WISH YOU ALL THE BEST 🌈</h1>
</div>

<div class="emoji e1">🎉</div>
<div class="emoji e2">🎂</div>
<div class="emoji e3">✨</div>
<div class="emoji e4">🎈</div>
<div class="emoji e5">🥳</div>
<div class="emoji e6">💥</div>
<div class="emoji e7">🍰</div>
<div class="emoji e8">🎊</div>

</div>


<script>

const page1 = document.getElementById("page1")
const videoPage = document.getElementById("videoPage")
const finalPage = document.getElementById("finalPage")

const video = document.getElementById("scareVideo")
const music = document.getElementById("bgMusic")

function startPrank(){

page1.style.display="none"
videoPage.classList.remove("hidden")

video.play()

}

video.onended = () => {

videoPage.style.display="none"
finalPage.classList.remove("hidden")

music.play().catch(()=>{})

setTimeout(()=>{
document.getElementById("emojiJump").style.opacity="0"
},700)

}

</script>

</body>
</html>
